<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oatput — Onboarding</title>
  <style>
    :root {
      --bg: #3d3320;
      --surface: #4a4036;
      --surface-2: #524738;
      --text: #e8dfc8;
      --text-muted: #b0a08c;
      --taupe: #9a8b78;
      --grain: #d4ba7a;
      --grain-outline: #9a7b3a;
      --leaf: #6d8c3a;
      --shadow: rgba(0, 0, 0, 0.22);
      --login-panel-text: #3d3320;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", Times, serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0.06em;
      line-height: 1.55;
      min-height: 100vh;
    }

    .preview-nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: color-mix(in srgb, var(--bg) 92%, black);
      border-bottom: 1px solid color-mix(in srgb, var(--grain-outline) 45%, transparent);
      backdrop-filter: blur(10px);
    }

    .preview-nav a {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--taupe);
      text-decoration: none;
    }

    .preview-nav a:hover,
    .preview-nav a[aria-current="page"] {
      color: var(--text);
    }

    .onboarding-wrap {
      position: relative;
      padding: 3rem 1.5rem 3rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .stepper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding: 0 0.25rem;
    }

    .stepper-line {
      flex: 1;
      height: 2px;
      background: color-mix(in srgb, var(--grain-outline) 55%, transparent);
      margin: 0 -0.25rem;
      z-index: 0;
    }

    .step-dot {
      position: relative;
      z-index: 1;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--grain-outline);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      flex-shrink: 0;
    }

    .step-dot.done,
    .step-dot.current {
      background: var(--grain);
      color: var(--login-panel-text);
      border-color: var(--grain-outline);
    }

    .step-dot.future {
      background: var(--surface-2);
    }

    .card {
      background: var(--surface);
      border: 1px solid color-mix(in srgb, var(--grain-outline) 50%, transparent);
      border-radius: 12px;
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 8px 28px var(--shadow);
    }

    .card h1 {
      font-size: 1.35rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      margin: 0 0 0.75rem;
      color: var(--text);
    }

    .card .lead {
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    label.field-label {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--taupe);
      margin-bottom: 0.4rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--grain-outline);
      border-radius: 8px;
      margin-bottom: 1.25rem;
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus {
      outline: 2px solid var(--leaf);
      outline-offset: 2px;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 14px 24px;
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: var(--login-panel-text);
      background: var(--grain);
      border: 1px solid var(--grain-outline);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
      transition: filter 0.15s ease, transform 0.15s ease;
    }

    .btn-primary:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .btn-secondary {
      padding: 12px 20px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--grain-outline);
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: color-mix(in srgb, var(--grain) 18%, transparent);
    }
  </style>
</head>
<body>
  <nav class="preview-nav" aria-label="UI previews">
    <a href="login_ui.html">Login</a>
    <a href="onboarding_ui.html" aria-current="page">Onboarding</a>
    <a href="dashboard_ui.html">Dashboard</a>
  </nav>

  <div class="onboarding-wrap">
    <div class="stepper" role="list" aria-label="Setup progress">
      <span class="step-dot done" role="listitem">1</span>
      <span class="stepper-line" aria-hidden="true"></span>
      <span class="step-dot current" role="listitem">2</span>
      <span class="stepper-line" aria-hidden="true"></span>
      <span class="step-dot future" role="listitem">3</span>
      <span class="stepper-line" aria-hidden="true"></span>
      <span class="step-dot future" role="listitem">4</span>
      <span class="stepper-line" aria-hidden="true"></span>
      <span class="step-dot future" role="listitem">5</span>
      <span class="stepper-line" aria-hidden="true"></span>
      <span class="step-dot future" role="listitem">6</span>
    </div>
    <div class="card">
      <h1 id="onb-heading">Connect Granola</h1>
      <p class="lead">Paste your API key from Granola settings. Keys are encrypted before storage.</p>
      <label class="field-label" for="fake-key">API key</label>
      <input id="fake-key" type="text" placeholder="granola_…" autocomplete="off" />
      <div class="btn-row">
        <button type="button" class="btn-primary" style="min-width: 160px">Save &amp; continue</button>
        <button type="button" class="btn-secondary">Back</button>
      </div>
    </div>
  </div>
</body>
</html>
